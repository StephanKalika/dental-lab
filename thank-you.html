    <style>
        .thank-you-page {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background: linear-gradient(180deg, #f6fff9 0%, #ffffff 100%);
        }

        .thank-you-card {
            width: min(100%, 680px);
            border: 1px solid #dcefe4;
            border-radius: 20px;
            background: #ffffff;
            box-shadow: 0 18px 45px rgba(24, 70, 43, 0.08);
            padding: 36px 28px;
            text-align: center;
        }

        .thank-you-card h1 {
            margin: 0 0 12px;
            color: #1e3a2f;
            font-size: clamp(1.7rem, 4vw, 2.3rem);
        }

        .thank-you-card p {
            margin: 0;
            color: #365246;
            font-size: 1.05rem;
            line-height: 1.6;
        }

        .thank-you-actions {
            margin-top: 24px;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .thank-you-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            border-radius: 12px;
            padding: 12px 18px;
            border: 1px solid #c9dfd2;
            color: #1f3f33;
            background: #f8fffb;
            transition: transform .2s ease, box-shadow .2s ease;
        }

        .thank-you-link:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 22px rgba(24, 70, 43, 0.12);
        }

        .thank-you-link-primary {
            background: linear-gradient(135deg, #a8e6cf, #8cddb9);
            border-color: #8cddb9;
            color: #123224;
            font-weight: 600;
        }
    </style>
</head>

    <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=1515232536899488&ev=PageView&noscript=1"
    /></noscript>
    <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=1515232536899488&ev=Lead&noscript=1"
    /></noscript>

    <main class="thank-you-page">
        <section class="thank-you-card" aria-labelledby="thankyou-title">
            <h1 id="thankyou-title">Дякуємо! Заявку успішно надіслано</h1>
            <p>Ми отримали ваше звернення та зв'яжемося з вами найближчим часом для підтвердження запису.</p>
            <div class="thank-you-actions">
                <a class="thank-you-link thank-you-link-primary" href="./">Повернутися на головну</a>
                <a class="thank-you-link" href="https://t.me/" target="_blank" rel="noopener">Перейти в Telegram-канал</a>
            </div>
        </section>
    </main>
</body>
</html>
