    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', 'Inter', sans-serif;
            background: #f4f7f8;
            color: #333333;
            min-height: 100vh;
        }

        /* ── Page layout ── */
        .ty-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 16px 48px;
        }

        /* ── Shared column — logo + card share the same axis ── */
        .ty-wrapper {
            width: min(100%, 560px);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── Logo bar ── */
        .ty-logo {
            margin-bottom: 28px;
            width: 100%;
            text-align: center;
        }

        /* ── Card ── */
        .ty-card {
            width: min(100%, 560px);
            background: #ffffff;
            border: 1px solid rgba(76, 160, 171, 0.18);
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(58, 84, 103, 0.1);
            padding: clamp(32px, 6vw, 52px) clamp(24px, 6vw, 52px);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        /* ── Animated checkmark ── */
        .ty-icon {
            width: 88px;
            height: 88px;
            margin-bottom: 28px;
            /* Circle pops in, then checkmark draws */
            animation: ty-pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s both;
        }

        /* Circle is always drawn — no dasharray trick */
        .ty-icon .circle {
            stroke: #4ca0ab;
            stroke-width: 2.5;
            fill: rgba(76, 160, 171, 0.06);
        }

        /* Checkmark draws in after icon appears */
        .ty-icon .check {
            stroke: #4ca0ab;
            stroke-width: 3.5;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 50;
            stroke-dashoffset: 50;
            animation: ty-draw-check 0.4s ease-out 0.5s forwards;
        }

        @keyframes ty-draw-check {
            to { stroke-dashoffset: 0; }
        }

        @keyframes ty-pop {
            0%   { transform: scale(0.4); opacity: 0; }
            100% { transform: scale(1);   opacity: 1; }
        }

        /* ── Heading ── */
        .ty-card h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: clamp(1.5rem, 4vw, 2rem);
            line-height: 1.25;
            color: #3a5467;
            margin-bottom: 16px;
        }

        /* ── Body text ── */
        .ty-card p {
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            font-size: 1rem;
            line-height: 1.6;
            color: #333333;
            max-width: 420px;
            margin-bottom: 32px;
        }

        /* ── Button ── */
        .ty-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            background: #4ca0ab;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 15px;
            padding: 14px 28px;
            border-radius: 50px;
            border: none;
            transition: background 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
            min-height: 48px;
        }

        .ty-btn:hover {
            background: #5eb0ba;
            box-shadow: 0 6px 18px rgba(76, 160, 171, 0.35);
            transform: translateY(-1px);
        }

        .ty-btn svg {
            flex-shrink: 0;
        }

        /* ── Mobile ── */
        @media (max-width: 480px) {
            .ty-page { padding: 24px 12px 40px; }
            .ty-logo { margin-bottom: 28px; }
            .ty-logo a { font-size: 24px; }
            .ty-card { padding: 28px 20px 32px; }
            .ty-icon { width: 68px; height: 68px; margin-bottom: 22px; }
            .ty-btn { width: 100%; justify-content: center; font-size: 16px; }
        }
